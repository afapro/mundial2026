<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/mundial2026/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mundial 26">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="apple-touch-icon" href="/mundial2026/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Mi Rastreador</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --accent: #e8b84b;
    --accent2: #c9963a;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }


  /* AUTH */
  .auth-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: Inter, sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .auth-btn:hover { background: rgba(255,255,255,0.22); }
  .auth-btn img { width: 18px; height: 18px; border-radius: 50%; }
  .sync-indicator {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 4px 0 2px;
    min-height: 18px;
  }
  .sync-ok { color: #4caf50; }
  .sync-err { color: var(--red); }

  /* HEADER */
  header {
    background: linear-gradient(90deg, #e8000d, #ff6b00, #ffe600, #00b140, #0057a8, #8b00ff);
    border-bottom: none;
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo-wrap {
    display: flex; align-items: center; gap: 10px;
  }

  .fifa-logo {
    height: 48px;
    width: auto;
    flex-shrink: 0;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.4));
  }

  .logo-text {
    display: flex; flex-direction: row; align-items: baseline; gap: 6px;
  }

  .logo-mundial {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px;
    color: #000;
  }

  .logo-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px;
    color: #000;
  }

  .header-stats { display: flex; gap: 12px; align-items: center; }
  .stat-pill { background: #000; border: none; border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; color: #fff; }
  .stat-pill .num { color: #fff; font-size: 16px; font-weight: 800; }

  /* PROGRESS */
  .progress-bar-container { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 16px; }
  .progress-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #e8000d, #ff6b00, #ffe600, #00b140, #0057a8, #8b00ff); border-radius: 4px; transition: width 0.4s ease; }
  .progress-label { font-size: 13px; color: var(--text-dim); white-space: nowrap; font-weight: 500; }
  .progress-pct { font-size: 15px; font-weight: 700; color: var(--accent); min-width: 44px; text-align: right; }

  /* TABS */
  .tabs { display: flex; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { padding: 14px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; letter-spacing: 0.5px; text-transform: uppercase; }
  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* FILTERS */
  .filters { padding: 14px 24px; display: flex; gap: 8px; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* MAIN */
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .section { display: none; }
  .section.visible { display: block; }

  /* DAY SEPARATOR */
  .day-block {
    margin-bottom: 20px;
    background: linear-gradient(135deg, #0f1e35 0%, #0a1628 100%);
    border: 1px solid #1a2d4a;
    border-radius: 12px;
    padding: 16px 16px 8px;
  }
  .day-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 12px;
  }
  .day-label {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px;
    color: #fff; white-space: nowrap;
  }
  .day-divider { flex: 1; height: 1px; background: #1a2d4a; }
  .day-count { font-size: 11px; color: var(--text-muted); font-weight: 600; background: rgba(0,0,0,0.3); padding: 3px 10px; border-radius: 10px; border: 1px solid #1a2d4a; white-space: nowrap; }

  /* MATCH CARD */
  .match-card {
    background: rgba(0,0,0,0.35); border: 1px solid #1e3352; border-radius: 10px;
    padding: 0; margin-bottom: 8px; transition: border-color 0.2s;
    position: relative; overflow: hidden;
  }
  .match-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border); transition: background 0.2s; }
  .match-card.seen::before { background: var(--green); }
  .match-card.seen { background: #0d1d10; border-color: #1a3a22; }
  .match-card.has-result { border-color: #2a3a5a; }

  .match-main {
    display: grid;
    grid-template-columns: 110px 1fr auto 1fr 60px 40px;
    align-items: center; gap: 10px;
    padding: 13px 16px 13px 20px;
    cursor: pointer;
  }

  .match-date { font-size: 11px; color: var(--text-muted); font-weight: 500; line-height: 1.5; }
  .match-date .time { font-size: 15px; font-weight: 700; color: var(--accent); display: block; }
  .match-date .group-badge { display: inline-block; font-size: 10px; font-weight: 700; color: #000; background: var(--accent); padding: 1px 6px; border-radius: 3px; margin-top: 2px; letter-spacing: 0.5px; }

  .team-home { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
  .team-away { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; flex-direction: row-reverse; text-align: right; }
  .flag { font-size: 20px; line-height: 1; flex-shrink: 0; display:flex; align-items:center; }
  .flag img, .bs-flag img { border-radius: 2px; vertical-align: middle; display:block; }
  .bs-flag { font-size: 14px; flex-shrink: 0; display:flex; align-items:center; }

  /* SCORE DISPLAY in card center */
  .score-display {
    text-align: center; min-width: 64px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .score-value {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
    color: #fff; line-height: 1;
  }
  .score-value.empty { color: var(--text-muted); font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0; }
  .score-jornada { font-size: 10px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; }

  .match-seen-btn { display: none; }
  ._match-seen-btn-orig {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; color: var(--text-muted); font-size: 15px;
    transition: all 0.2s; flex-shrink: 0;
  }
  .match-seen-btn:hover { border-color: var(--green); color: var(--green); transform: scale(1.1); }
  .match-card.seen .match-seen-btn { background: var(--green); border-color: var(--green); color: #000; }

  /* RESULT EDITOR (expandable) */
  .result-editor {
    display: none;
    padding: 12px 20px 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .result-editor.open { display: flex; }

  .result-teams-row {
    display: flex; align-items: center; gap: 10px; flex: 1; min-width: 260px;
  }
  .result-team-name { font-size: 13px; font-weight: 600; flex: 1; }
  .result-team-name.away { text-align: right; }

  .score-input {
    width: 48px; height: 40px; text-align: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; outline: none;
    transition: border-color 0.2s;
  }
  .score-input:focus { border-color: var(--accent); }
  .score-dash { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text-muted); }

  .result-actions { display: flex; gap: 8px; }
  .btn-save {
    padding: 8px 16px; background: var(--accent); color: #000;
    border: none; border-radius: 6px; font-weight: 700; font-size: 12px;
    cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.5px;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--accent2); }
  .btn-clear {
    padding: 8px 14px; background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 6px; font-weight: 600; font-size: 12px;
    cursor: pointer; font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  .edit-result-btn {
    font-size: 11px; font-weight: 600; color: var(--text-muted); cursor: pointer;
    padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; font-family: 'Inter', sans-serif;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .edit-result-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* GROUP SECTION */
  .group-block { margin-bottom: 32px; }
  .group-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .group-label { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
  .group-teams { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .group-divider { flex: 1; height: 1px; background: var(--border); }
  .group-progress-mini { font-size: 11px; color: var(--text-muted); font-weight: 600; background: var(--surface2); padding: 3px 10px; border-radius: 10px; border: 1px solid var(--border); }

  /* STANDINGS */
  .standings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }
  .standing-table { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .standing-header { padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1.5px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
  .standing-col-headers { display: grid; grid-template-columns: 22px 1fr 26px 26px 26px 26px 32px 32px; gap: 2px; padding: 6px 14px; font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .standing-row { display: grid; grid-template-columns: 22px 1fr 26px 26px 26px 26px 32px 32px; gap: 2px; padding: 8px 14px; font-size: 13px; align-items: center; border-bottom: 1px solid #0e1724; transition: background 0.1s; }
  .standing-row:last-child { border-bottom: none; }
  .standing-row:hover { background: var(--surface2); }
  .standing-row.q1 { background: rgba(34,197,94,0.07); }
  .standing-row.q3 { background: rgba(232,184,75,0.05); }
  .standing-row .pos { color: var(--text-muted); font-size: 11px; font-weight: 700; text-align: center; }
  .standing-row .pts { font-weight: 700; color: var(--accent); text-align: center; }
  .standing-row .nc { text-align: center; color: var(--text-dim); font-size: 12px; }
  .standing-row .gd { text-align: center; font-size: 12px; }
  .standing-row .team-sml { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 5px; }

  /* SQUAD */
  .squad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
  .team-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .team-flag-big { font-size: 30px; display:flex; align-items:center; }
  .team-flag-big img { width:32px; height:24px; border-radius:3px; }
  .team-info { flex: 1; }
  .team-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .team-group-badge { font-size: 11px; color: var(--accent); font-weight: 600; }
  .team-arrow { color: var(--text-muted); font-size: 18px; }

  .squad-detail { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.82); z-index: 1000; overflow-y: auto; padding: 32px 16px; }
  .squad-detail.open { display: flex; justify-content: center; }
  .squad-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 780px; padding: 28px; height: fit-content; }
  .squad-panel-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .squad-panel-flag { font-size: 44px; display:flex; align-items:center; }
  .squad-panel-flag img { width:52px; height:39px; border-radius:4px; }
  .squad-panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; }
  .squad-panel-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .close-btn { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .close-btn:hover { border-color: var(--red); color: var(--red); }
  .pos-section { margin-bottom: 18px; }
  .pos-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 6px; padding: 5px 12px; background: var(--surface2); border-radius: 6px; border-left: 3px solid var(--accent); }
  .player-row { display: grid; grid-template-columns: 28px 1fr 60px 1fr 22px 22px; gap: 6px; padding: 8px 12px; border-radius: 6px; font-size: 13px; align-items: center; transition: background 0.15s; }
  .player-row:hover { background: var(--surface2); }
  .player-num { color: var(--text-muted); font-size: 11px; font-weight: 700; text-align: center; }
  .player-name { font-weight: 600; }
  .player-age { color: var(--text-muted); font-size: 12px; text-align: center; }
  .player-club { color: var(--text-dim); font-size: 11px; text-align: right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .player-crest { display:flex; align-items:center; justify-content:center; }
  .player-crest img { width:18px; height:18px; object-fit:contain; }
  .player-captain { color: var(--accent); font-size: 13px; text-align: center; }
  .loading-squad { text-align: center; padding: 40px; color: var(--text-muted); }
  .loading-squad .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-dim); }

  /* ── ELIMINATORIAS ── */
  .ko-phase { margin-bottom: 36px; }
  .ko-phase-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
  }
  .ko-phase-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent);
    white-space: nowrap;
  }
  .ko-phase-divider { flex: 1; height: 1px; background: var(--border); }
  .ko-phase-count { font-size: 11px; color: var(--text-muted); font-weight: 600; background: var(--surface2); padding: 3px 10px; border-radius: 10px; border: 1px solid var(--border); white-space: nowrap; }

  .ko-grid {
    display: grid;
    gap: 10px;
  }
  .ko-grid-2  { grid-template-columns: repeat(2, 1fr); }
  .ko-grid-4  { grid-template-columns: repeat(4, 1fr); }
  .ko-grid-8  { grid-template-columns: repeat(4, 1fr); }
  .ko-grid-16 { grid-template-columns: repeat(4, 1fr); }

  @media (max-width: 800px) {
    .ko-grid-4, .ko-grid-8, .ko-grid-16 { grid-template-columns: repeat(2, 1fr); }
    .ko-grid-2 { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .ko-grid-4, .ko-grid-8, .ko-grid-16, .ko-grid-2 { grid-template-columns: 1fr; }
  }

  /* KO match card */
  .ko-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: border-color 0.2s;
    position: relative;
  }
  .ko-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--border); transition:background 0.2s; }
  .ko-card.seen::before { background: var(--green); }
  .ko-card.seen { background: #0d1d10; border-color: #1a3a22; }
  .ko-card.has-result { border-color: #2a3a5a; }

  .ko-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-muted); padding: 6px 12px 4px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .ko-label .ko-date { color: var(--accent); }

  .ko-teams {
    padding: 10px 12px; cursor: pointer;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 6px;
  }
  .ko-team {
    display: flex; align-items: center; gap: 6px;
    font-weight: 600; font-size: 13px;
    min-width: 0;
  }
  .ko-team.away { flex-direction: row-reverse; text-align: right; }
  .ko-team.winner { color: var(--accent); }
  .ko-team.loser  { color: var(--text-muted); }
  .ko-team span.kt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .ko-score {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px;
    color: #fff; min-width: 48px;
  }
  .ko-score.empty { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0; }
  .ko-score .ko-pen { font-size: 10px; font-family:'Inter',sans-serif; color: var(--text-muted); display: block; letter-spacing: 0; font-weight: 500; }

  .ko-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px 8px;
    border-top: 1px solid var(--border);
    gap: 6px;
  }

  /* Team slot input */
  .slot-input {
    background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--text); width: 100%; min-width: 0;
    cursor: pointer;
  }
  .slot-input::placeholder { color: var(--text-muted); font-weight: 400; font-style: italic; }

  /* KO result editor */
  .ko-editor {
    display: none; padding: 10px 12px 12px; border-top: 1px solid var(--border);
    background: var(--surface2); flex-direction: column; gap: 10px;
  }
  .ko-editor.open { display: flex; }

  .ko-editor-row {
    display: grid; grid-template-columns: 1fr 40px 8px 40px 1fr;
    align-items: center; gap: 6px;
  }
  .ko-editor-team { font-size: 12px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ko-editor-team.away { text-align: center; }
  .ko-score-input {
    width: 40px; height: 36px; text-align: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; outline: none; transition: border-color 0.2s;
  }
  .ko-score-input:focus { border-color: var(--accent); }
  .ko-dash { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text-muted); text-align: center; }

  .ko-pen-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .ko-pen-label { font-size: 11px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .ko-pen-input {
    width: 36px; height: 28px; text-align: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; outline: none; transition: border-color 0.2s;
  }
  .ko-pen-input:focus { border-color: var(--accent); }

  .ko-editor-actions { display: flex; gap: 6px; }

  .ko-slot-editor {
    display: none; padding: 10px 12px 12px; border-top: 1px solid var(--border);
    background: var(--surface2); gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .ko-slot-editor.open { display: flex; }
  .ko-slot-input-text {
    flex: 1; min-width: 120px; padding: 7px 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; outline: none; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; transition: border-color 0.2s;
  }
  .ko-slot-input-text:focus { border-color: var(--accent); }
  .ko-slot-label { font-size: 12px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }

  /* ── BRACKET VISUAL ── */
  .bracket-bar {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .bracket-scroll {
    overflow-x: auto;
    padding-bottom: 16px;
  }

  .bracket-cols {
    display: flex;
    gap: 12px;
    min-width: max-content;
    align-items: flex-start;
  }

  .bracket-col {
    display: flex;
    flex-direction: column;
    width: 190px;
    flex-shrink: 0;
  }

  .bracket-col-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 1.5px;
    color: var(--accent);
    text-align: center;
    padding: 8px 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 10px;
  }

  .bracket-col-matches {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── MATCH SLOT (bracket card) ── */
  .bs-match {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }
  .bs-match::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:3px; background:var(--border); transition:background 0.2s;
  }
  .bs-match.bs-seen::before { background:var(--green); }
  .bs-match.bs-seen { background:#0d1d10; border-color:#1a3a22; }
  .bs-match.bs-has-result { border-color:#2a3a5a; }

  .bs-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .bs-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
  .bs-date  { font-size: 9px; color: var(--accent); font-weight: 600; }

  .bs-body {
    cursor: pointer;
    padding: 2px 0;
  }
  .bs-body:hover { background: rgba(255,255,255,0.02); }

  .bs-slot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px;
    min-height: 28px;
    gap: 4px;
  }
  .bs-slot.bs-winner { background: rgba(232,184,75,0.07); }
  .bs-slot.bs-loser  { opacity: 0.55; }

  .bs-team { display: flex; align-items: center; gap: 5px; min-width: 0; flex: 1; }
  .bs-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .bs-score-wrap { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
  .bs-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; line-height: 1;
    color: var(--text-dim); min-width: 16px; text-align: center;
  }
  .bs-score.bs-score-win { color: var(--accent); }
  .bs-pen { font-size: 9px; color: var(--text-muted); }

  .bs-divider {
    height: 1px; background: var(--border); margin: 0 8px;
  }

  .bs-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 6px;
    border-top: 1px solid var(--border);
    gap: 4px;
  }

  .bs-edit-btn {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
    white-space: nowrap;
  }
  .bs-edit-btn:hover { border-color:var(--accent); color:var(--accent); }

  .bs-editor {
    display: none; flex-direction: column; gap: 8px;
    padding: 8px 10px 10px; border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .bs-editor.open { display: flex; }

  .bs-editor-row {
    display: flex; align-items: center; gap: 5px; justify-content: center;
  }
  .bs-editor-team { font-size: 16px; }

  .bracket-f-wrap {
    display: flex; flex-direction: column; gap: 16px;
    justify-content: center;
  }
  .bracket-tp-inline { opacity: 0.85; }

  @media (max-width: 640px) {
    .match-main { grid-template-columns: 80px 1fr auto 1fr 48px; gap: 6px; padding: 11px 12px 11px 16px; }
    .team-home, .team-away { font-size: 12px; gap: 6px; }
    .flag { font-size: 17px; }
    .score-value { font-size: 18px; }
    header { padding: 0 12px; }
    main { padding: 12px; }
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {

    /* Header: dos filas en móvil */
    header {
      height: auto;
      flex-wrap: wrap;
      padding: 8px 12px;
      gap: 6px;
    }
    .logo-wrap { flex: 1; min-width: 0; }
    .fifa-logo { height: 36px; }
    .logo-mundial, .logo-year { font-size: 20px; letter-spacing: 2px; }

    /* Stats pills más pequeños */
    .header-stats { gap: 6px; }
    .stat-pill { padding: 4px 10px; font-size: 11px; }
    .stat-pill .num { font-size: 13px; }

    /* Auth btn: ancho completo en segunda fila */
    #auth-wrap {
      width: 100%;
      order: 3;
    }
    .auth-btn {
      width: 100%;
      justify-content: center;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 8px;
    }

    /* Progress bar */
    .progress-bar-container { padding: 8px 12px; gap: 8px; }
    .progress-label { font-size: 11px; }

    /* Tabs: scroll horizontal en vez de wrap */
    .tabs {
      padding: 0 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 12px 14px;
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Filtros: scroll horizontal */
    #filters-bar, #squad-filters-bar {
      padding: 8px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap;
      scrollbar-width: none;
      gap: 6px;
    }
    #filters-bar::-webkit-scrollbar,
    #squad-filters-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 5px 10px;
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Contenido principal */
    main { padding: 8px 12px; }

    /* Tarjetas de partidos */
    .match-main {
      grid-template-columns: 60px 1fr auto 1fr 44px;
      gap: 4px;
      padding: 10px 10px 10px 12px;
    }
    .team-home, .team-away { font-size: 11px; gap: 4px; }
    .flag { font-size: 15px; }
    .score-value { font-size: 16px; }
    .match-date { font-size: 11px; }
    .time { font-size: 13px !important; }
    .group-badge { font-size: 9px; padding: 1px 5px; }

    /* Nombres que se cortan: reducir fuente */
    .team-home span:last-child,
    .team-away span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70px;
    }

    /* Day header */
    .day-label { font-size: 14px; }
    .day-count { font-size: 11px; }

    /* Clasificación */
    .standings-grid { grid-template-columns: 1fr; }
    .standing-row { font-size: 12px; }
    .team-sml { font-size: 11px; }

    /* Plantillas grid */
    .squad-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .team-card { padding: 10px 12px; }
    .team-name { font-size: 13px; }

    /* Panel de plantilla */
    .squad-panel { padding: 16px 12px; }
    .player-row { font-size: 12px; }
    .player-num { width: 22px; font-size: 11px; }
    .player-age { width: 26px; font-size: 11px; }

    /* Eliminatorias: scroll horizontal */
    .bracket-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .bracket-cols { min-width: 900px; }
    .bs-match { min-width: 160px; }
    .bs-name { font-size: 12px; }
    .bs-score { font-size: 13px; }
  }


  /* HISTORIA */
  #historia-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    padding: 16px 0;
  }
  .wc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }
  .wc-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .wc-card-img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    background: #fff;
    padding: 12px;
  }
  .wc-card-img-placeholder {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    background: var(--surface2);
  }
  .wc-card-body {
    padding: 12px 14px;
  }
  .wc-card-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }
  .wc-card-host {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .wc-card-winner {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .wc-card-final {
    font-size: 11px;
    color: var(--text-muted);
  }
  .wc-card-trophy { color: #f1c40f; margin-right: 4px; }

  @media (max-width: 600px) {
    #historia-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .wc-card-img { height: 120px; }
    .wc-card-year { font-size: 18px; }
  }

  /* LOGOUT MODAL */
  .logout-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .logout-modal.open { display: flex; }
  .logout-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 280px;
    text-align: center;
  }
  .logout-box h3 { font-size: 16px; margin-bottom: 8px; }
  .logout-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .logout-btns { display: flex; gap: 10px; justify-content: center; }
  .logout-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 13px; }
  .logout-confirm { background: #c0392b; border: none; color: #fff; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .logout-confirm:hover { background: #e74c3c; }


  .version-badge {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #e74c3c;
    z-index: 999;
    cursor: default;
  }

// STATE
// ═══════════════════════════════════════════════════════════════
let seen     = new Set(JSON.parse(localStorage.getItem('wc2026_seen')    || '[]'));
let results  = JSON.parse(localStorage.getItem('wc2026_results') || '{}'); // {id: {h:2,a:1}}
let openEditor = null; // id of currently open result editor

function saveSeen()    { localStorage.setItem('wc2026_seen',    JSON.stringify([...seen])); }
function saveResults() { localStorage.setItem('wc2026_results', JSON.stringify(results)); }

function toggleSeen(id) {
  if (seen.has(id)) seen.delete(id); else seen.add(id);
  saveSeen();
  updateStats();
  // Update just this card
  const card = document.querySelector(`.match-card[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('seen', seen.has(id));
    
  }
}

function saveResult(id) {
  const hInput = document.getElementById(`sh-${id}`);
  const aInput = document.getElementById(`sa-${id}`);
  const hVal = hInput.value.trim();
  const aVal = aInput.value.trim();

  if (hVal === '' && aVal === '') {
    delete results[id];
  } else {
    const h = parseInt(hVal);
    const a = parseInt(aVal);
    if (isNaN(h) || isNaN(a) || h < 0 || a < 0) { alert('Introduce números válidos (0 o más).'); return; }
    results[id] = { h, a };
  }
  saveResults();
  closeEditor();
  renderMatchCard(id);
  updateStats();
}

function clearResult(id) {
  delete results[id];
  saveResults();
  closeEditor();
  renderMatchCard(id);
  updateStats();
}

function openEditorFor(id) {
  window._editorOpen = true;
  if (openEditor && openEditor !== id) closeEditor();
  openEditor = id;
  const ed = document.getElementById(`editor-${id}`);
  if (ed) ed.classList.add('open');
}

function closeEditor() {
  window._editorOpen = false;
  if (openEditor) {
    const ed = document.getElementById(`editor-${openEditor}`);
    if (ed) ed.classList.remove('open');
    openEditor = null;
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER SINGLE CARD (update in-place after result save)
// ═══════════════════════════════════════════════════════════════
function renderMatchCard(id) {
  const m = MATCHES.find(x => x.id === id);
  if (!m) return;
  const card = document.querySelector(`.match-card[data-id="${id}"]`);
  if (!card) return;
  const r = results[id];
  const isSeen = seen.has(id);

  card.className = `match-card ${isSeen ? 'seen' : ''} ${r !== undefined ? 'has-result' : ''}`;

  const scoreHTML = r !== undefined
    ? `<div class="score-value">${r.h} – ${r.a}</div><div class="score-jornada">J${m.jornada}</div>`
    : `<div class="score-value empty">vs</div><div class="score-jornada">J${m.jornada}</div>`;

  card.querySelector('.score-display').innerHTML = scoreHTML;
  
  card.classList.toggle('seen', isSeen);
  card.classList.toggle('has-result', r !== undefined);

  // Update editor inputs if open
  const hIn = document.getElementById(`sh-${id}`);
  const aIn = document.getElementById(`sa-${id}`);
  if (hIn) hIn.value = r !== undefined ? r.h : '';
  if (aIn) aIn.value = r !== undefined ? r.a : '';
}

// ═══════════════════════════════════════════════════════════════
// BUILD MATCH HTML
// ═══════════════════════════════════════════════════════════════
function buildMatchHTML(m) {
  const isSeen = seen.has(m.id);
  const r = results[m.id];
  const scoreHTML = r !== undefined
    ? `<div class="score-value">${r.h} – ${r.a}</div><div class="score-jornada">J${m.jornada}</div>`
    : `<div class="score-value empty">vs</div><div class="score-jornada">J${m.jornada}</div>`;

  return `
  <div class="match-card ${isSeen ? 'seen' : ''} ${r !== undefined ? 'has-result' : ''}" data-id="${m.id}">
    <div class="match-main" onclick="toggleSeen(${m.id})">
      <div class="match-date">
        <span class="time">${m.time}${m.md ? '<span style="color:#e8b84b;font-size:10px">*</span>' : ''}</span>
        ${m.dateLabel}
        <br><span class="group-badge">GR. ${m.group}</span>
      </div>
      <div class="team-home"><span class="flag">${m.hf}</span><span>${m.home}</span></div>
      <div class="score-display">${scoreHTML}</div>
      <div class="team-away"><span class="flag">${m.af}</span><span>${m.away}</span></div>
      <button class="edit-result-btn" onclick="event.stopPropagation(); openEditorFor(${m.id})">'✏️'</button>
    </div>
    <div class="result-editor" id="editor-${m.id}">
      <div class="result-teams-row">
        <span class="result-team-name">${m.hf} ${m.home}</span>
        <input class="score-input" id="sh-${m.id}" type="number" min="0" max="99" value="${r !== undefined ? r.h : ''}" placeholder="0" onclick="event.stopPropagation()">
        <span class="score-dash">–</span>
        <input class="score-input" id="sa-${m.id}" type="number" min="0" max="99" value="${r !== undefined ? r.a : ''}" placeholder="0" onclick="event.stopPropagation()">
        <span class="result-team-name away">${m.away} ${m.af}</span>
      </div>
      <div class="result-actions">
        <button class="btn-save" onclick="saveResult(${m.id})">Guardar</button>
        <button class="btn-clear" onclick="clearResult(${m.id})">Borrar</button>
        <button class="btn-clear" onclick="closeEditor()" style="border-color:transparent">✕</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER MATCHES — chronological with day separators
// ═══════════════════════════════════════════════════════════════
let currentFilter = 'all';

function renderMatches() {
  const container = document.getElementById('section-partidos');

  let filtered = [...MATCHES];
  if (currentFilter === 'vistos')             filtered = filtered.filter(m => seen.has(m.id));
  else if (currentFilter === 'no-vistos')     filtered = filtered.filter(m => !seen.has(m.id));
  else if (currentFilter === 'con-resultado') filtered = filtered.filter(m => results[m.id] !== undefined);
  else if (currentFilter !== 'all')           filtered = filtered.filter(m => m.group === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>Sin partidos</h3><p>No hay partidos con este filtro.</p></div>`;
    return;
  }

  // Siempre agrupar por día — usa day-block (con fondo) en todos los filtros
  const byDay = {};
  filtered.forEach(m => {
    if (!byDay[m.dateLabel]) byDay[m.dateLabel] = [];
    byDay[m.dateLabel].push(m);
  });

  let html = '';
  for (const [day, matches] of Object.entries(byDay)) {
    const seenDay = matches.filter(m => seen.has(m.id)).length;
    const resDay  = matches.filter(m => results[m.id] !== undefined).length;
    html += `<div class="day-block">
      <div class="day-header">
        <span class="day-label">${day}</span>
        <div class="day-divider"></div>
        <span class="day-count">${seenDay}/${matches.length} vistos · ${resDay} resultados</span>
      </div>
      ${matches.map(buildMatchHTML).join('')}
    </div>`;
  }
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
function computeStandings() {
  const table = {};
  for (const [g, gData] of Object.entries(GROUPS)) {
    table[g] = {};
    gData.teams.forEach((t, i) => {
      table[g][t] = { flag: gData.flags[i], pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 };
    });
  }
  MATCHES.forEach(m => {
    const r = results[m.id];
    if (!r) return;
    const home = table[m.group]?.[m.home];
    const away = table[m.group]?.[m.away];
    if (!home || !away) return;
    home.pj++; away.pj++;
    home.gf += r.h; home.gc += r.a;
    away.gf += r.a; away.gc += r.h;
    if (r.h > r.a)       { home.g++; home.pts+=3; away.p++; }
    else if (r.h < r.a)  { away.g++; away.pts+=3; home.p++; }
    else                  { home.e++; away.e++; home.pts++; away.pts++; }
  });
  return table;
}

function renderStandings() {
  const container = document.getElementById('section-clasificacion');
  const table = computeStandings();
  let html = `<p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">La clasificación se actualiza automáticamente cuando introduces resultados.</p>
  <div class="standings-grid">`;

  for (const [g, teams] of Object.entries(table)) {
    const sorted = Object.entries(teams).sort(([,a],[,b]) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const gdA = a.gf - a.gc, gdB = b.gf - b.gc;
      if (gdB !== gdA) return gdB - gdA;
      return b.gf - a.gf;
    });

    html += `<div class="standing-table">
      <div class="standing-header"><span>GRUPO ${g}</span><span style="font-family:Inter;font-size:11px;font-weight:400;color:var(--text-muted)">${GROUPS[g].flags.join(' ')}</span></div>
      <div class="standing-col-headers"><div>#</div><div>Equipo</div><div>PJ</div><div>G</div><div>E</div><div>P</div><div>GD</div><div>Pts</div></div>`;

    sorted.forEach(([name, d], i) => {
      const gd = d.gf - d.gc;
      const cls = i < 2 ? 'q1' : (i === 2 ? 'q3' : '');
      html += `<div class="standing-row ${cls}">
        <div class="pos">${i+1}</div>
        <div class="team-sml">${d.flag} ${name}</div>
        <div class="nc">${d.pj}</div>
        <div class="nc">${d.g}</div>
        <div class="nc">${d.e}</div>
        <div class="nc">${d.p}</div>
        <div class="gd" style="color:${gd>0?'var(--green)':gd<0?'var(--red)':'var(--text-dim)'}">${gd>0?'+':''}${gd}</div>
        <div class="pts">${d.pts}</div>
      </div>`;
    });

    html += `<div style="padding:5px 14px;font-size:10px;color:var(--text-muted);border-top:1px solid var(--border)"><span style="color:var(--green)">■</span> Clasificados directos &nbsp;·&nbsp; <span style="color:var(--accent)">■</span> Posible 3.º clasificado</div>`;
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function clubCrest(clubName) {
  // Generate a color from the club name
  let hash = 0;
  for (let i = 0; i < clubName.length; i++) hash = clubName.charCodeAt(i) + ((hash << 5) - hash);
  const h = Math.abs(hash) % 360;
  const bg = `hsl(${h},45%,28%)`;
  const color = `hsl(${h},60%,75%)`;
  const initials = clubName.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return `<span style="width:20px;height:20px;background:${bg};border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${color};flex-shrink:0">${initials}</span>`;
}
const TEAM_FLAG_CODE = {};
const TEAM_GROUP = {};
Object.entries(GROUPS).forEach(([g, gData]) => {
  gData.teams.forEach((team, i) => {
    // Extract code from f() result — stored in gData.flagCodes
    TEAM_GROUP[team] = g;
  });
});
// Build flag code map from MATCHES data
MATCHES.forEach(m => {
  // Extract src from img tag: src="https://flagcdn.com/20x15/CODE.png"
  const extractCode = (imgHtml) => {
    const m2 = imgHtml.match(/flagcdn\.com\/20x15\/([^.]+)\.png/);
    return m2 ? m2[1] : '';
  };
  if (!TEAM_FLAG_CODE[m.home]) TEAM_FLAG_CODE[m.home] = extractCode(m.hf);
  if (!TEAM_FLAG_CODE[m.away]) TEAM_FLAG_CODE[m.away] = extractCode(m.af);
});

function renderSquads() {
  const container = document.getElementById('section-plantillas');

  // Determinar qué grupos mostrar
  const groupsToShow = currentSquadFilter === 'all'
    ? Object.keys(GROUPS)
    : [currentSquadFilter];

  let html = `<p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">Haz clic en una selección para ver su convocatoria oficial al Mundial 2026.</p>`;

  groupsToShow.forEach(g => {
    const gData = GROUPS[g];
    if (!gData) return;

    html += `<div class="day-block" style="margin-bottom:16px">
      <div class="day-header">
        <span class="day-label" style="color:var(--accent)">GRUPO ${g}</span>
        <span style="font-size:12px;color:var(--text-muted);font-weight:500;margin-left:4px">${gData.teams.join(' · ')}</span>
        <div class="day-divider"></div>

      <div class="squad-grid" style="margin-bottom:0">`;

    gData.teams.forEach((team, i) => {
      const flagImg = gData.flags[i];
      const hasLocal = !!SQUADS[team];
      html += `<div class="team-card" onclick="openSquad('${team.replace(/'/g,"\\'")}','${g}')">
        <div class="team-flag-big">${flagImg}</div>
        <div class="team-info">

        </div>
        <div class="team-arrow">›</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

async function openSquad(team, group) {
  const flagCode = TEAM_FLAG_CODE[team] || '';
  const flagImg = flagCode ? f(flagCode) : '';
  const modal = document.getElementById('squad-modal');
  const panel = document.getElementById('squad-panel');
  modal.classList.add('open');
  panel.innerHTML = `
    <div class="squad-panel-header">
      <div class="squad-panel-flag">${flagImg}</div>
      <div><div class="squad-panel-title">${team}</div><div class="squad-panel-sub">Grupo ${group} · Mundial 2026</div></div>
      <button class="close-btn" onclick="closeSquad()">✕</button>
    </div>
    <div class="loading-squad"><div class="spinner"></div><div>Cargando plantilla de ${team}…</div></div>`;

  // Try local data first
  if (SQUADS[team]) {
    const sq = SQUADS[team];
    const squad = { seleccionador: sq.sel, jugadores: sq.j.map(p => ({...p, capitan: !!p.c})) };
    renderSquadPanel(panel, team, flagImg, group, squad);
    return;
  }

  // Fallback: API
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:1000,
        system:`Devuelve SOLO JSON válido sin texto extra ni backticks. Formato exacto:
{"seleccionador":"nombre","jugadores":[{"num":1,"nombre":"Nombre Apellido","pos":"POR","edad":28,"club":"Club FC","capitan":true}]}
Posiciones: POR, DEF, MED, DEL. capitan:true solo al capitán principal. Datos reales convocatoria oficial Mundial 2026.`,
        messages:[{role:"user",content:`Convocatoria oficial de ${team} para el Mundial 2026. 26 jugadores reales con posición, edad en 2026 y club actual.`}]
      })
    });
    const data = await res.json();
    const text = data.content.map(b=>b.text||'').join('');
    const squad = JSON.parse(text.replace(/```json|```/g,'').trim());
    renderSquadPanel(panel, team, flagImg, group, squad);
  } catch(err) {
    // Show what we know
    panel.innerHTML = `
      <div class="squad-panel-header">
        <div class="squad-panel-flag">${flagImg}</div>
        <div><div class="squad-panel-title">${team}</div><div class="squad-panel-sub">Grupo ${group}</div></div>
        <button class="close-btn" onclick="closeSquad()">✕</button>
      </div>
      <div class="loading-squad" style="color:var(--text-muted);padding:32px">
        <div style="font-size:32px;margin-bottom:12px">📋</div>
        <div style="font-weight:600;margin-bottom:8px">Datos no disponibles offline</div>
        <div style="font-size:13px">La plantilla de <b>${team}</b> no está en los datos locales.<br>Necesita conexión a internet para cargar.</div>
        <br><button onclick="openSquad('${team.replace(/'/g,"\'")}','${group}')" style="margin-top:8px;padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-family:Inter,sans-serif">Reintentar</button>
      </div>`;
  }
}

function renderSquadPanel(panel, team, flag, group, squad) {
  const positions = [
    {key:'POR',label:'🧤 Porteros'},
    {key:'DEF',label:'🛡️ Defensas'},
    {key:'MED',label:'⚙️ Centrocampistas'},
    {key:'DEL',label:'⚡ Delanteros'},
  ];
  let html = `
    <div class="squad-panel-header">
      <div class="squad-panel-flag">${flag}</div>
      <div><div class="squad-panel-title">${team}</div><div class="squad-panel-sub">Grupo ${group} · Seleccionador: ${squad.seleccionador||'—'}</div></div>
      <button class="close-btn" onclick="closeSquad()">✕</button>
    </div>`;
  positions.forEach(pos => {
    const players = (squad.jugadores||[]).filter(p=>p.pos===pos.key);
    if (!players.length) return;
    html += `<div class="pos-section"><div class="pos-title">${pos.label}</div>`;

      html += `<div class="player-row">

// ── AUTO-RESOLVER: obtener equipo desde resultados ─────────────
function getGroupStandings() {
  const table = {};
  for (const [g, gData] of Object.entries(GROUPS)) {
    table[g] = {};
    gData.teams.forEach((t, i) => {
      table[g][t] = { flag:gData.flags[i], name:t, pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 };
    });
  }
  MATCHES.forEach(m => {
    const r = results[m.id];
    if (!r) return;
    const home = table[m.group]?.[m.home];
    const away = table[m.group]?.[m.away];
    if (!home || !away) return;
    home.pj++; away.pj++;
    home.gf += r.h; home.gc += r.a;
    away.gf += r.a; away.gc += r.h;
    if (r.h > r.a)      { home.g++; home.pts+=3; away.p++; }
    else if (r.h < r.a) { away.g++; away.pts+=3; home.p++; }
    else                 { home.e++; away.e++; home.pts++; away.pts++; }
  });
  // Sort each group
  const sorted = {};
  for (const [g, teams] of Object.entries(table)) {
    sorted[g] = Object.values(teams).sort((a,b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const gdA=a.gf-a.gc, gdB=b.gf-b.gc;
      if (gdB !== gdA) return gdB - gdA;
      return b.gf - a.gf;
    });
  }
  return sorted;
}

// Obtener ganador/perdedor de un partido KO
function koWinner(id) {
  const r = koResults[id];
  if (!r) return null;
  const home = resolveKoTeam(id, 'home');
  const away = resolveKoTeam(id, 'away');
  if (!home || !away) return null;
  if (r.ph !== undefined) return r.ph > r.pa ? home : away;
  if (r.h > r.a) return home;
  if (r.a > r.h) return away;
  return null; // empate sin penaltis (no debería pasar en KO)
}

function koLoser(id) {
  const r = koResults[id];
  if (!r) return null;
  const home = resolveKoTeam(id, 'home');
  const away = resolveKoTeam(id, 'away');
  if (!home || !away) return null;
  if (r.ph !== undefined) return r.ph > r.pa ? away : home;
  if (r.h > r.a) return away;
  if (r.a > r.h) return home;
  return null;
}

// Resolver equipo de un partido KO (home o away)
// Devuelve {name, flag} o null
function resolveKoTeam(id, side) {
  const m = KO[id];
  if (!m) return null;
  const src = side === 'home' ? m.homeSrc : m.awaySrc;
  if (!src) return { name: side==='home'?m.homeSlot:m.awaySlot, flag:'', pending:true };

  const standings = getGroupStandings();

  if (src.type === 'group') {
    const g = standings[src.g];
    if (!g) return null;
    // Check if all group matches played
    const gMatches = MATCHES.filter(m2 => m2.group === src.g);
    const played = gMatches.filter(m2 => results[m2.id]).length;
    if (played < gMatches.length) return { name: side==='home'?m.homeSlot:m.awaySlot, flag:'⏳', pending:true };
    const team = g[src.pos - 1];
    if (!team) return null;
    return { name: team.name, flag: team.flag, pending: false };
  }

  if (src.type === 'best3') {
    // Best 3rd place from specified groups
    const allThirds = Object.entries(standings)
      .filter(([g]) => src.groups.includes(g))
      .map(([g, arr]) => arr[2])
      .filter(Boolean)
      .sort((a,b) => {
        if (b.pts!==a.pts) return b.pts-a.pts;
        const gdA=a.gf-a.gc, gdB=b.gf-b.gc;
        if (gdB!==gdA) return gdB-gdA;
        return b.gf-a.gf;
      });
    // Only show if all relevant groups finished jornada 3
    const allDone = src.groups.split('').every(g => {
      const gm = MATCHES.filter(m2=>m2.group===g);
      return gm.filter(m2=>results[m2.id]).length === gm.length;
    });
    if (!allDone) return { name: side==='home'?m.homeSlot:m.awaySlot, flag:'⏳', pending:true };
    const best = allThirds[0];
    if (!best) return null;
    return { name: best.name, flag: best.flag, pending: false };
  }

  if (src.type === 'winner') {
    const w = koWinner(src.id);
    if (!w) return { name: `W${src.id}`, flag:'⏳', pending:true };
    return { ...w, pending:false };
  }

  if (src.type === 'loser') {
    const l = koLoser(src.id);
    if (!l) return { name: `L${src.id}`, flag:'⏳', pending:true };
    return { ...l, pending:false };
  }

  return null;
}

function toggleKoSeen(id) {
  if (koSeen.has(id)) koSeen.delete(id); else koSeen.add(id);
  saveKoSeen();
  reRenderBracket();
}

function saveKoResult(id) {
  const hEl = document.getElementById(`ksh-${id}`);
  const aEl = document.getElementById(`ksa-${id}`);
  if (!hEl||!aEl) return;
  const hv=hEl.value.trim(), av=aEl.value.trim();
  if (hv===''&&av==='') { delete koResults[id]; }
  else {
    const h=parseInt(hv), a=parseInt(av);
    if (isNaN(h)||isNaN(a)||h<0||a<0) { alert('Introduce números válidos.'); return; }
    const obj = {h,a};
    const phEl=document.getElementById(`kph-${id}`), paEl=document.getElementById(`kpa-${id}`);
    if (phEl&&paEl&&phEl.value.trim()!=='') {
      const ph=parseInt(phEl.value), pa=parseInt(paEl.value);
      if (!isNaN(ph)&&!isNaN(pa)) { obj.ph=ph; obj.pa=pa; }
    }
    koResults[id] = obj;
  }
  saveKoResults();
  openKoEditor = null;
  reRenderBracket();
}

function clearKoResult(id) {
  delete koResults[id];
  saveKoResults();
  openKoEditor = null;
  reRenderBracket();
}

function openKoEditorFor(id) {
  window._editorOpen = true;
  openKoEditor = openKoEditor === id ? null : id;
  reRenderBracket();
}

// ── BUILD KO SLOT HTML ────────────────────────────────────────
function buildKoSlot(id, side) {
  const m = KO[id];
  const r = koResults[id];
  const team = resolveKoTeam(id, side);
  const isSeen = koSeen.has(id);

  let homeWin=false, awayWin=false;
  if (r) {
    if (r.ph!==undefined) { homeWin=r.ph>r.pa; awayWin=r.pa>r.ph; }
    else { homeWin=r.h>r.a; awayWin=r.a>r.h; }
  }
  const isWinner = side==='home' ? homeWin : awayWin;
  const isLoser  = r && (side==='home' ? awayWin : homeWin);

  const name = team ? team.name : (side==='home'?m.homeSlot:m.awaySlot);
  const flag = team ? team.flag : '';
  const pending = !team || team.pending;

  const nameStyle = isWinner ? 'color:var(--accent);font-weight:700'
                  : isLoser  ? 'color:var(--text-muted)'
                  : pending  ? 'color:var(--text-muted);font-style:italic'
                  : 'color:var(--text);font-weight:600';

  const score = r !== undefined
    ? (side==='home' ? r.h : r.a)
    : '';

  const penScore = r?.ph !== undefined
    ? (side==='home' ? r.ph : r.pa)
    : '';

  return `<div class="bs-slot ${isWinner?'bs-winner':''} ${isLoser?'bs-loser':''}">
    <div class="bs-team">
      <span class="bs-flag">${flag}</span>
      <span class="bs-name" style="${nameStyle}">${name}</span>
    </div>
    <div class="bs-score-wrap">
      ${score!=='' ? `<span class="bs-score ${isWinner?'bs-score-win':''}">${score}</span>` : ''}
      ${penScore!=='' ? `<span class="bs-pen">(${penScore})</span>` : ''}
    </div>
  </div>`;
}

function reRenderBracket() {
  const container = document.getElementById('section-eliminatorias');
  if (!container || !container.classList.contains('visible')) return;
  renderEliminatorias();
}

function renderEliminatorias() {
  const container = document.getElementById('section-eliminatorias');
  const total = KO_IDS.length;
  const seenN = KO_IDS.filter(id=>koSeen.has(id)).length;
  const resN  = KO_IDS.filter(id=>koResults[id]!==undefined).length;

  <div class="bracket-scroll">

      const half1 = col.ids.slice(0,8);
      const half2 = col.ids.slice(8,16);
      half1.forEach(id => { html += buildKoMatchHTML(id); });

        <div class="bracket-tp-inline">

          ${buildKoMatchHTML(351)}
        </div>
      </div>`;
    } else {
      col.ids.forEach(id => { html += buildKoMatchHTML(id); });
    }

    html += `</div></div>`;
  });

  html += `</div></div>`;
  container.innerHTML = html;
}

  localStorage.removeItem('wc2026_seen');
  localStorage.removeItem('wc2026_results');
  localStorage.removeItem('wc2026_koSeen2');
  localStorage.removeItem('wc2026_koResults2');
  window._lastCloudUpdatedAt = null;
  updateStats();
  renderMatches();
}

async function confirmLogout() {
  document.getElementById('logout-modal').classList.remove('open');
  // Clear everything immediately regardless of Supabase response
  currentUser = null;
  updateAuthBtn(null);
  setSyncStatus('');
  clearLocalData();
  window._lastCloudUpdatedAt = null;
  // Then try to sign out from Supabase
  try { await sb.auth.signOut({ scope: 'local' }); } catch(e) {}
}

function setSyncStatus(msg, type='') {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-indicator' + (type ? ' sync-' + type : '');
}

function updateAuthBtn(user) {
  const btn = document.getElementById('auth-btn');
  if (!btn) return;
  if (user) {
    const avatar = user.user_metadata?.avatar_url;
    btn.innerHTML = avatar
      ? `<img src="${avatar}" alt=""> ${user.user_metadata?.name?.split(' ')[0] || user.email} · Cerrar sesión`
      : `👤 ${user.email} · Cerrar sesión`;
  } else {
    btn.innerHTML = '🔑 Iniciar sesión';
  }
}

async function syncToCloud() {
  if (!currentUser) return;
  console.log('[upload] subiendo a la nube...');
  const payload = {
    user_id: currentUser.email,
    seen: JSON.stringify([...seen]),
    results: JSON.stringify(results),
    ko_seen: JSON.stringify([...koSeen]),
    ko_results: JSON.stringify(koResults),
    updated_at: new Date().toISOString()
  };
  const { error } = await sb.from('progress').upsert(payload, { onConflict: 'user_id' });
  if (error) { setSyncStatus('⚠️ Error al guardar', 'err'); }
  else { window._lastSyncTime = Date.now(); setSyncStatus(''); console.log('[upload] guardado en nube, _lastSyncTime=', window._lastSyncTime); }
}

async function applyCloudData(data) {
  try {
    seen      = new Set(JSON.parse(data.seen       || '[]'));
    results   = JSON.parse(data.results   || '{}');
    koSeen    = new Set(JSON.parse(data.ko_seen    || '[]'));
    koResults = JSON.parse(data.ko_results || '{}');
    localStorage.setItem('wc2026_seen',       JSON.stringify([...seen]));
    localStorage.setItem('wc2026_results',    JSON.stringify(results));
    localStorage.setItem('wc2026_koSeen2',    JSON.stringify([...koSeen]));
    localStorage.setItem('wc2026_koResults2', JSON.stringify(koResults));
    window._lastCloudUpdatedAt = data.updated_at; // store string, not timestamp
    updateStats();
    renderMatches();
    if (document.getElementById('section-eliminatorias')?.classList.contains('visible')) reRenderBracket();
  } catch(e) {}
}

async function loadFromCloud() {
  if (!currentUser) return;
  try {
    const { data, error } = await sb.from('progress').select('*').eq('user_id', currentUser?.email || currentUser).single();
    if (!error && data) await applyCloudData(data);
  } catch(e) {}
}

// Patch save functions — upload 1.5s after last change
const _origSaveSeen = saveSeen;
saveSeen = function() { _origSaveSeen(); if(currentUser) { clearTimeout(window._syncT); window._syncT = setTimeout(syncToCloud, 1500); } };
const _origSaveResults = saveResults;
saveResults = function() { _origSaveResults(); if(currentUser) { clearTimeout(window._syncT); window._syncT = setTimeout(syncToCloud, 1500); } };
const _origSaveKoSeen = saveKoSeen;
saveKoSeen = function() { _origSaveKoSeen(); if(currentUser) { clearTimeout(window._syncT); window._syncT = setTimeout(syncToCloud, 1500); } };
const _origSaveKoResults = saveKoResults;
saveKoResults = function() { _origSaveKoResults(); if(currentUser) { clearTimeout(window._syncT); window._syncT = setTimeout(syncToCloud, 1500); } };

// Auto-sync: pull from cloud every 3s if something changed
setInterval(async () => {
  const userEmail = currentUser?.email || (typeof currentUser === 'string' ? currentUser : null);
  if (!userEmail || window._editorOpen) return;
  try {
    const { data, error } = await sb.from('progress').select('*').eq('user_id', userEmail).single();
    if (error || !data) return;
    // Compare updated_at strings directly — if different, apply
    if (window._lastCloudUpdatedAt && data.updated_at === window._lastCloudUpdatedAt) return;
    await applyCloudData(data);
  } catch(e) {}
}, 3000);

// Auth state
sb.auth.getSession().then(async ({ data: { session } }) => {
  if (session?.user) {
    currentUser = session.user;
    updateAuthBtn(currentUser);
    await loadFromCloud();
  } else {
    clearLocalData();
  }
});

sb.auth.onAuthStateChange(async (event, session) => {
  currentUser = session?.user || null;
  updateAuthBtn(currentUser);
  if (event === 'SIGNED_IN') await loadFromCloud();
  if (event === 'SIGNED_OUT') { setSyncStatus(''); clearLocalData(); }
});

function renderHistoria() {
  const grid = document.getElementById('historia-grid');
  if (!grid) return;
  grid.innerHTML = WORLD_CUPS.slice().reverse().map(wc => {
    const imgHtml = wc.img
      ? `<img class="wc-card-img" src="data:image/jpeg;base64,${wc.img}" alt="${wc.year}" loading="lazy">`
      : `<div class="wc-card-img-placeholder">${wc.flag}</div>`;
    return `<div class="wc-card">
      ${imgHtml}
      <div class="wc-card-body">
        <div class="wc-card-year">${wc.year}</div>
        <div class="wc-card-host">${wc.flag} ${wc.pais}</div>
        <div class="wc-card-winner"><span class="wc-card-trophy">🏆</span>${wc.ganador}</div>
        <div class="wc-card-final">Final: ${wc.ganador} ${wc.gf} ${wc.finalista}</div>
      </div>
    </div>`;
  }).join('');
}
